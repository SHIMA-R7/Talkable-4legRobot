# config/settings.yaml
# =====================

system:
  name: "RobotChan"
  log_level: "INFO"
  log_file: "logs/robot.log"

# --- Tailscale ネットワーク ---
network:
  server_host: "100.88.108.71"   # サーバー(Windows)のTailscale IP
  server_port: 8000
  ws_audio_path:   "/ws/audio"
  ws_control_path: "/ws/control"
  connect_timeout_sec: 10
  reconnect_interval_sec: 5
  max_reconnect_attempts: 0
  heartbeat_interval_sec: 15

# --- 音声認識言語設定 ---
# speech_recognition + Google Web Speech API (APIキー不要) で
# ウェイクワード検知・本文認識の両方を行う
google_stt:
  language_code: "ja-JP"

# --- VOICEVOX (音声合成) ---
# サーバー(Windows)側でVOICEVOXエンジンを起動し、Tailscale経由でアクセスする
# 起動: run.exe (デフォルトポート50021)
voicevox:
  enabled: true
  host: "100.88.108.71"   # サーバーのTailscale IP
  port: 50021
  speaker_id: 2           # 四国めたん(ノーマル)。VOICEVOX /speakers で確認可能
  timeout_sec: 10

# --- 音声 (AIY Voice HAT) ---
audio:
  device_name: "snd_rpi_googlevoicehat_soundcar"
  wake_words:
    - "ねえロボット"
    - "ロボットちゃん"
    - "hey robot"
    - "アリス"
    - "あり"

# --- サーボ (PCA9685) ---
# 脚部 0x40 (動作確認済み) / 首部 0x41 (基板放棄・未接続)
servo:
  leg:
    i2c_address: 0x40
    pwm_frequency: 50
    channels:
      RF_hip: 14
      LF_hip: 15
      RR_hip: 12
      LR_hip: 13
      RF_knee: 10
      LF_knee: 11
      RR_knee: 8
      LR_knee: 9
  head:
    i2c_address: 0x41
    pwm_frequency: 50
    channels:
      head_tilt: 15
      head_pan: 14
  min_pulse_us: 500
  max_pulse_us: 2500
  neutral_pulse_us: 1500

# --- SPI ディスプレイ (AIY Voice HAT流用ピン) ---
display:
  enabled: true
  driver: "st7735"
  width: 128
  height: 160
  spi_bus: 0
  spi_device: 0
  spi_speed_hz: 40000000
  pin_dc: 6
  pin_reset: 26
  pin_backlight: 13
  default_brightness: 1.0

camera:
  device: 0
  default_width: 640
  default_height: 480
  default_quality: 85
  fps: 10
  rotation: 0

# --- Gemini ---
gemini:
  model: "gemini-2.5-flash-lite"
  max_tokens: 1024
  temperature: 0.85
  tool_config:
    mode: "AUTO"
  autonomous_loop:
    enabled: true
    idle_trigger_sec: 30

# --- FastAPI サーバー ---
server:
  host: "0.0.0.0"
  port: 8000
  workers: 1

# --- 安全機能 ---
safety:
  cpu_temp_max_c: 80
  servo_stall_timeout_ms: 2000
  watchdog_timeout_sec: 30
